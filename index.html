<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Gradient Mapper</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============ HEADER ============ -->
  <header class="app-header">
    <img class="app-header__logo" src="images/Logo.svg" alt="every else" />
  </header>

  <div class="app-shell">

    <!-- ============ LEFT GLASS PANEL ============ -->
    <aside class="glass-panel glass-panel--left">
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden />

      <div class="field-group">
        <span class="field-label">Image</span>
        <button class="btn btn--primary" id="uploadBtn">Upload Image</button>
        <div class="file-meta" id="fileMeta">No image loaded</div>
      </div>

      <div class="field-group">
        <span class="field-label">Export</span>
        <button class="btn" id="exportBtn">
          Export Image
          <img class="btn__icon" src="images/export logo.svg" alt="" />
        </button>
      </div>
    </aside>

    <!-- ============ CENTER: PILL PREVIEW ============ -->
    <main class="pill-stage-wrapper">
      <div class="canvas-wrapper" id="canvasWrapper">
        <div class="canvas-stage" id="canvasStage">
          <canvas id="artCanvas" width="1200" height="780"></canvas>
        </div>
      </div>

    </main>

    <!-- ============ RIGHT GLASS PANEL: RENDER CONTROLS ============ -->
    <aside class="glass-panel glass-panel--right">
      <section class="panel-section">
        <h2 class="panel-title">Render Controls</h2>
        <div class="controls-grid" id="controlsGrid">
          <!-- Slider rows are injected by controls.js -->
        </div>
        <button class="btn btn--dark btn--reset" id="resetBtn">Reset</button>
      </section>
    </aside>

  </div>

  <!-- ============ FOOTER ============ -->
  <footer class="app-footer">
    <img class="app-footer__mark" src="images/footer.svg" alt="© every else. All rights reserved." />
  </footer>

  <!-- ============ CUSTOM CURSOR ============ -->
  <img id="customCursor" class="custom-cursor" src="images/Cursor.svg" alt="" aria-hidden="true" />

  <!-- ============ MOBILE ONBOARDING (<=768px only) ============ -->
  <div id="mobileOnboarding" class="mobile-onboarding">
    <div id="mobileOnboardingBackdrop" class="mobile-onboarding__backdrop">
      <img src="images/mobile onboarding.svg" alt="" />
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/imageLoader.js"></script>
  <script src="js/circleEngine.js"></script>
  <script src="js/circleAnimator.js"></script>
  <script src="js/canvasView.js"></script>
  <script src="js/maskPainter.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/exporter.js"></script>
  <script src="js/customCursor.js"></script>
  <script src="js/mobileOnboarding.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
