<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Gradient Mapper</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============ HEADER ============ -->
  <header class="app-header">
    <div class="app-header__brand">
      <span class="app-header__mark"></span>
      <span class="app-header__title">AI Gradient Mapper</span>
    </div>
    <div class="app-header__sub">Circle-based color mask generator</div>
  </header>

  <div class="app-shell">

    <!-- ============ LEFT PANEL ============ -->
    <aside class="panel panel--left">
      <section class="panel-block">
        <h2 class="panel-block__title">Image</h2>
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden />
        <button class="btn btn--primary" id="uploadBtn">Upload Image</button>
        <div class="file-meta" id="fileMeta">No image loaded</div>
      </section>

      <section class="panel-block">
        <h2 class="panel-block__title">Export</h2>
        <button class="btn" id="exportPngBtn">Export PNG</button>
        <button class="btn" id="exportTransparentBtn">Export Transparent PNG</button>
        <button class="btn" id="exportSvgBtn">Export SVG</button>
      </section>

      <section class="panel-block panel-block--push">
        <button class="btn btn--ghost" id="resetBtn">Reset</button>
      </section>
    </aside>

    <!-- ============ CENTER: CANVAS ============ -->
    <main class="panel panel--center">
      <div class="zoom-bar">
        <button class="zoom-btn" data-zoom="0.25">25%</button>
        <button class="zoom-btn" data-zoom="0.5">50%</button>
        <button class="zoom-btn is-active" data-zoom="1">100%</button>
        <button class="zoom-btn" data-zoom="2">200%</button>
        <button class="zoom-btn" data-zoom="fit">Fit</button>
        <span class="zoom-readout" id="zoomReadout">100%</span>
      </div>

      <div class="canvas-wrapper" id="canvasWrapper">
        <div class="canvas-stage" id="canvasStage">
          <canvas id="artCanvas" width="900" height="900"></canvas>
          <div class="canvas-empty" id="canvasEmpty">
            <p>Upload a PNG, JPG or WEBP image to begin</p>
          </div>
        </div>
      </div>
    </main>

    <!-- ============ RIGHT PANEL: PALETTE ============ -->
    <aside class="panel panel--right">
      <section class="panel-block">
        <h2 class="panel-block__title">Palette Editor</h2>
        <div class="palette-grid" id="paletteGrid"></div>
        <div class="palette-actions">
          <button class="btn btn--small" id="addColorBtn">Add Color</button>
          <button class="btn btn--small" id="deleteColorBtn">Delete Color</button>
          <button class="btn btn--small btn--ghost" id="resetPaletteBtn">Reset Palette</button>
        </div>
      </section>
    </aside>

    <!-- ============ BOTTOM PANEL: RENDER CONTROLS ============ -->
    <section class="panel panel--bottom">
      <h2 class="panel-block__title">Render Controls</h2>
      <div class="controls-grid" id="controlsGrid">
        <!-- Slider rows are injected by controls.js, but static markup kept for clarity/accessibility -->
      </div>
    </section>

  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/imageLoader.js"></script>
  <script src="js/circleEngine.js"></script>
  <script src="js/canvasView.js"></script>
  <script src="js/palette.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/exporter.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
